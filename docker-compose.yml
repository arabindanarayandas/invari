version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: invari-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invari}
      POSTGRES_USER: ${POSTGRES_USER:-invari}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invari123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invari}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Invari Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invari-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-invari}:${POSTGRES_PASSWORD:-invari123}@db:5432/${POSTGRES_DB:-invari}

      # Server Configuration
      PORT: 3000
      NODE_ENV: production

      # JWT Secret (CHANGE THIS IN PRODUCTION!)
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-use-long-random-string}

      # CORS (comma-separated origins)
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:5173}

      # Optional: Cron jobs enabled
      ENABLE_CRON: ${ENABLE_CRON:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
