# Upstream for Node.js backend
upstream fluxguard_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP Server - Initial Configuration (certbot will convert this to HTTPS)
# After running: sudo certbot --nginx -d lab.invari.ai
# Certbot will automatically:
# 1. Obtain SSL certificates
# 2. Create HTTPS (443) configuration
# 3. Add redirect from HTTP (80) to HTTPS (443)
server {
    listen 80;
    listen [::]:80;

    # Domain name
    server_name lab.invari.ai;

    # Root directory for static files
    root /var/www/fluxguard/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/fluxguard-access.log;
    error_log /var/log/nginx/fluxguard-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/javascript application/xml+rss
               application/json application/xml;

    # API proxy - Forward to Node.js backend
    location /api {
        proxy_pass http://fluxguard_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy endpoint
    location /proxy {
        proxy_pass http://fluxguard_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # Longer timeouts for proxy operations
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://fluxguard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Serve static files (React app)
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
